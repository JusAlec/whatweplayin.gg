name = "whatweplayin"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "18dbad46911b4c628702b8e47d41b5f1"
preview_id = "43e751f40669435aacac776316358cd5"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "whatweplayin-prod"
database_id = "PLACEHOLDER_REPLACE_AFTER_CREATE"
migrations_dir = "migrations"

[triggers]
crons = ["0 3 * * *"]  # Daily 03:00 UTC — Steam library sync + rating cache rebuild
