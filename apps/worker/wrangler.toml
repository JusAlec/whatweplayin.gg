name = "whatweplayin"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "18dbad46911b4c628702b8e47d41b5f1"
preview_id = "43e751f40669435aacac776316358cd5"

[observability]
enabled = true

[vars]
BETTER_AUTH_URL = "https://whatweplayin.gg"
SITE_ORIGIN = "https://whatweplayin.gg"
SESSION_COOKIE_DOMAIN = "whatweplayin.gg"

# v2.1 feature flags
WWP_FEAT_AUTOSYNC_ON_LOGIN = "true"
WWP_FEAT_THUMBS = "true"
WWP_FEAT_RECOMMENDATIONS = "true"
WWP_FEAT_STEAM_RATINGS = "true"

# v2.1 tunables
WWP_AUTOSYNC_STALENESS_HOURS = "6"
WWP_WEIGHT_THUMBS = "0.5"
WWP_WEIGHT_OWNERSHIP = "0.3"
WWP_WEIGHT_NOVELTY = "0.2"
WWP_RECOMMENDATIONS_LIMIT = "5"
WWP_THUMBS_DOWN_VETO_DAYS = "7"

[[d1_databases]]
binding = "DB"
database_name = "whatweplayin-prod"
database_id = "f95b424a-288d-4d6c-9d5b-9189cb178198"
migrations_dir = "migrations"

[triggers]
crons = ["0 3 * * *"]  # Daily 03:00 UTC — Steam library sync + rating cache rebuild
