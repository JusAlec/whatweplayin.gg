name: test

on:
  push:
    branches: [main, v2-foundation]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate catalog
        # TODO(v2.1): replace with D1 catalog validation once games table ships.
        run: pnpm validate:catalog

      - name: Lint
        run: pnpm lint

      - name: D1 migration syntax check
        run: |
          for f in apps/worker/migrations/*.sql; do
            echo "Validating $f"
            sqlite3 :memory: < "$f" || exit 1
          done

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests (recommender)
        run: pnpm --filter @wwp/recommender test

      - name: Unit tests (scripts)
        run: pnpm --filter @wwp/scripts test

      - name: Worker tests (miniflare)
        run: pnpm --filter @wwp/worker test
        env:
          BETTER_AUTH_SECRET: test_secret_for_ci_only_${{ github.sha }}

      - name: Site build
        run: pnpm --filter @wwp/site build

      # TODO(v2.1): re-add E2E tests against v2 routes (sign-in, group home, invite landing).
      # v1 E2E suite was deleted with the v1 site surface in Batch 8.

  deploy-worker:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Push Worker secrets from GitHub Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          set -euo pipefail
          for SECRET_NAME in BETTER_AUTH_SECRET RESEND_API_KEY STEAM_API_KEY; do
            VALUE="${!SECRET_NAME:-}"
            if [ -z "$VALUE" ]; then
              echo "::warning::GitHub secret $SECRET_NAME is unset; skipping"
              continue
            fi
            echo "Pushing $SECRET_NAME to Worker..."
            echo -n "$VALUE" | pnpm --filter @wwp/worker exec wrangler secret put "$SECRET_NAME"
          done

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @wwp/worker exec wrangler d1 migrations apply whatweplayin-prod --remote

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        # `pnpm deploy` is a builtin (copies a workspace to a target dir);
        # `pnpm run deploy` invokes the script defined in apps/worker/package.json.
        run: pnpm --filter @wwp/worker run deploy
