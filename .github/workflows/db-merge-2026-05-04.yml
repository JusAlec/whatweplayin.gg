name: db-merge-2026-05-04

# One-shot data fix: merge a Steam-only user into an email-only user so the
# same person isn't represented as two separate accounts. Triggered manually,
# scheduled to be deleted after verification.

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Pre-merge state
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "## Pre-merge users + oauth_accounts" >> "$GITHUB_STEP_SUMMARY"
          pnpm --filter @wwp/worker exec wrangler d1 execute whatweplayin-prod --remote --command "SELECT id, email, display_name FROM users WHERE id IN ('01KQRPHT4E4J8WW0J6TDXY4AAR', '01KQRQXF9VVZ0Q70FJV8ANE4AJ')" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          pnpm --filter @wwp/worker exec wrangler d1 execute whatweplayin-prod --remote --command "SELECT user_id, provider, provider_user_id FROM oauth_accounts WHERE user_id IN ('01KQRPHT4E4J8WW0J6TDXY4AAR', '01KQRQXF9VVZ0Q70FJV8ANE4AJ')" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Run merge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "## Merge output" >> "$GITHUB_STEP_SUMMARY"
          pnpm --filter @wwp/worker exec wrangler d1 execute whatweplayin-prod --remote --file=scripts/2026-05-04-merge-steam-into-email.sql 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Post-merge state
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "## Post-merge users + oauth_accounts (Steam user should be gone)" >> "$GITHUB_STEP_SUMMARY"
          pnpm --filter @wwp/worker exec wrangler d1 execute whatweplayin-prod --remote --command "SELECT id, email, display_name, avatar_url FROM users WHERE id IN ('01KQRPHT4E4J8WW0J6TDXY4AAR', '01KQRQXF9VVZ0Q70FJV8ANE4AJ')" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          pnpm --filter @wwp/worker exec wrangler d1 execute whatweplayin-prod --remote --command "SELECT user_id, provider, provider_user_id FROM oauth_accounts" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
